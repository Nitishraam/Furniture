<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In - Stackly</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #2c1810 0%, #1a0f07 50%, #8b4513 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-container {
            background: rgba(24, 15, 5, 0.95);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(139, 69, 19, 0.3);
            border-radius: 20px;
            padding: 3rem;
            width: 100%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            animation: slideUp 0.8s ease-out;
            position: relative;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(139, 69, 19, 0.2);
            color: #ccc4c4;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            background: rgba(201, 100, 29, 0.3);
            color: #c0c0c0;
            transform: scale(1.1);
        }

        .logo {
            width: 120px;
            height: 50px;
            margin: 0 auto 2rem;
            display: block;
        }

        .logo img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        h2 {
            color: #ccc4c4;
            text-align: center;
            font-size: 2rem;
            font-weight: 700;
            margin-bottom: 1rem;
            text-shadow: 0 2px 10px rgba(0, 0, 0, 0.5);
        }

        .subtitle {
            color: #a8a8a8;
            text-align: center;
            margin-bottom: 2.5rem;
            font-size: 1rem;
        }

        .form-group {
            position: relative;
            margin-bottom: 1.5rem;
        }

        .form-group input {
            width: 100%;
            padding: 16px 20px 16px 50px;
            background: rgba(139, 69, 19, 0.1);
            border: 2px solid rgba(192, 192, 192, 0.2);
            border-radius: 12px;
            color: #ccc4c4;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input::placeholder {
            color: #8a8a8a;
        }

        .form-group input:focus {
            outline: none;
            border-color: #c0c0c0;
            background: rgba(192, 192, 192, 0.15);
            box-shadow: 0 0 20px rgba(192, 192, 192, 0.2);
        }

        .form-group i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: rgb(252, 195, 138);
            font-size: 18px;
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(45deg, #c0c0c0, #8b4513);
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 1rem;
            box-shadow: 0 8px 25px rgba(192, 192, 192, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 35px rgba(139, 69, 19, 0.5);
        }

        .toggle-link {
            text-align: center;
            margin-top: 1.5rem;
            color: rgb(240, 231, 214);
        }

        .toggle-link a {
            color: #c9641d;
            text-decoration: none;
            font-weight: 500;
        }

        .toggle-link a:hover {
            color: #c0c0c0;
        }

        .error-msg {
            background: rgba(139, 0, 0, 0.2);
            color: #ff6b6b;
            padding: 12px;
            border-radius: 8px;
            margin-bottom: 1rem;
            border-left: 4px solid #ff4444;
            display: none;
        }

        @media (max-width: 480px) {
            .auth-container {
                padding: 2.5rem 1.5rem 3rem;
                margin: 1rem;
            }
            
            .close-btn {
                top: 15px;
                right: 15px;
                width: 36px;
                height: 36px;
                font-size: 16px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <button class="close-btn" onclick="closeAuth()" title="Close">
            <i class="fas fa-times"></i>
        </button>
        
        <a href="../index.html" class="logo">
            <img src="../Images/logo.webp" alt="Stackly">
        </a>
        
        <h2>Sign In</h2>
        <p class="subtitle">Welcome back to Stackly</p>
        
        <div id="errorMsg" class="error-msg">
            <i class="fas fa-exclamation-triangle"></i>
            Please fill all fields and ensure password is more than 6 characters
        </div>

        <form id="signinForm" onsubmit="handleSignIn(event)">
            <div class="form-group">
                <i class="fas fa-envelope"></i>
                <input type="email" id="email" placeholder="Email Address" required>
            </div>
            
            <div class="form-group">
                <i class="fas fa-lock"></i>
                <input type="password" id="password" placeholder="Password" required>
            </div>
            
            <button type="submit" class="submit-btn">
                <i class="fas fa-sign-in-alt"></i> Sign In
            </button>
        </form>
        
        <div class="toggle-link">
            Don't have an account? <a href="./signup.html">Sign Up</a>
        </div>
    </div>

    <script>
        function handleSignIn(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value;
            const errorMsg = document.getElementById('errorMsg');
            
            // Reset error
            errorMsg.style.display = 'none';
            
            // Validation
            if (!email || !password) {
                showError('Please fill all fields');
                return;
            }
            
            if (password.length < 6) {
                showError('Password must be more than 6 characters');
                return;
            }
            
            if (!isValidEmail(email)) {
                showError('Please enter a valid email address');
                return;
            }
            
            // Redirect to error page (as requested)
            window.location.href = 'error.html';
        }
        
        function showError(message) {
            const errorMsg = document.getElementById('errorMsg');
            errorMsg.textContent = message;
            errorMsg.style.display = 'block';
            errorMsg.scrollIntoView({ behavior: 'smooth' });
        }
        
        function isValidEmail(email) {
            return /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        }
        
        function closeAuth() {
            window.location.href = '../index.html';
        }
    </script>
</body>
</html>
